<!DOCTYPE html>
<html lang="en" >

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title shown in the browser tab -->
    <title>Artist Login</title>
    <script>
        try {
            if (localStorage.getItem('sidebar-collapsed') === 'true') {
                document.documentElement.classList.add('sidebar-collapsed-init');
            }
        } catch (error) {}
    </script>

    <!-- Shared site styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Font setup -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icon library -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="app-container">
        <!-- Top navigation bar -->
        <header class="top-nav glass-panel">
            <div class="nav-links">
                <a href="index.html" class="nav-item"><i class="ph ph-house"></i> Home</a>
                <a href="commissions.html" class="nav-item"><i class="ph ph-palette"></i> Commissions</a>
                <a href="connect.html" class="nav-item"><i class="ph ph-users"></i> Connect</a>
                <a href="auth.html" class="nav-item active"><i class="ph ph-user"></i> Profile</a>
                <a href="settings.html" class="nav-item"><i class="ph ph-gear"></i> Settings</a>
            </div>

            <!-- Notification button + small profile icon -->
            <div class="profile-section">
                <button class="icon-btn" aria-label="Notifications">
                    <i class="ph ph-bell"></i>
                    <span class="notification-dot"></span>
                </button>
                <a class="profile-avatar" href="profile.html" aria-label="Open artist profile">
                    <img src="https://ui-avatars.com/api/?name=Artist&background=2563eb&color=fff" alt="Profile avatar">
                </a>
            </div>
        </header>

        <div class="content-wrapper">
            <!-- Left sidebar navigation -->
            <aside class="sidebar glass-panel" id="sidebar">
                <button class="toggle-btn" id="toggle-sidebar" aria-label="Toggle Navigation">
                    <i class="ph ph-caret-left"></i>
                </button>

                <nav class="side-nav">
                    <div class="nav-group-title">Commissions & Tutorials</div>
                    <a href="#" class="side-nav-item has-submenu"><i class="ph ph-monitor"></i> <span
                            class="nav-text">Digital Art</span></a>
                    <div class="submenu">
                        <div class="submenu-inner">
                            <a href="tutorial.html" class="submenu-item">Tutorials</a>
                            <a href="commissions.html" class="submenu-item">Comm.</a>
                        </div>
                    </div>
                    <a href="pottery_page.html" class="side-nav-item"><i class="ph ph-coffee"></i> <span
                            class="nav-text">Pottery</span></a>
                    <a href="jewlery_page.html" class="side-nav-item"><i class="ph ph-diamond"></i> <span
                            class="nav-text">Jewelry</span></a>
                    <a href="music_page_frontend.html" class="side-nav-item"><i class="ph ph-music-notes"></i> <span
                            class="nav-text">Music</span></a>
                    <a href="crochet_page.html" class="side-nav-item"><i class="ph ph-yarn"></i> <span
                            class="nav-text">Crochet</span></a>
                </nav>
            </aside>

            <!-- Main page content -->
            <main class="main-content">
                <div class="content-card glass-panel">
                    <section class="auth-shell">
                        <!-- Intro text -->
                        <h1 class="page-title">Welcome Back</h1>
                        <p class="intro-text">Log in or create an account to continue to your profile page.</p>
                        <p id="auth-message" class="auth-message" aria-live="polite"></p>
                        <div id="auth-session-panel" class="auth-session-panel glass-panel-lite" hidden>
                            <p class="auth-session-copy">
                                Signed in as <strong id="auth-session-name">Artist</strong>.
                            </p>
                            <div class="auth-session-actions">
                                <a href="profile.html" class="btn btn-primary">Go to Profile</a>
                                <button id="auth-logout-btn" class="btn btn-secondary" type="button">Log Out</button>
                            </div>
                        </div>

                        <!-- Card that holds login/signup tabs and forms -->
                        <div id="auth-panel" class="auth-panel glass-panel">
                            <!-- Tab buttons used to switch between login and sign up -->
                            <div class="auth-tabs" role="tablist" aria-label="Account actions">
                                <button class="auth-tab active" data-auth-tab="login" type="button" role="tab"
                                    aria-selected="true">Login</button>
                                <button class="auth-tab" data-auth-tab="signup" type="button" role="tab"
                                    aria-selected="false">Sign Up</button>
                            </div>

                            <!-- Login form -->
                            <form id="login-form" class="auth-form active" autocomplete="on">
                                <label class="auth-label" for="login-email">Email</label>
                                <input id="login-email" class="auth-input" type="email" placeholder="you@example.com"
                                    required>

                                <label class="auth-label" for="login-password">Password</label>
                                <input id="login-password" class="auth-input" type="password"
                                    placeholder="Enter password" required>

                                <button class="btn btn-primary auth-submit" type="submit">Login and Continue</button>
                            </form>

                            <!-- Sign-up form -->
                            <form id="signup-form" class="auth-form" autocomplete="on">
                                <label class="auth-label" for="signup-name">Display Name</label>
                                <input id="signup-name" class="auth-input" type="text" placeholder="Your artist name"
                                    required>

                                <label class="auth-label" for="signup-email">Email</label>
                                <input id="signup-email" class="auth-input" type="email" placeholder="you@example.com"
                                    required>

                                <label class="auth-label" for="signup-password">Password</label>
                                <input id="signup-password" class="auth-input" type="password"
                                    placeholder="Create password" required>

                                <button class="btn btn-primary auth-submit" type="submit">Sign Up and Continue</button>
                            </form>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>


<script src="themer.js"></script>
    <!-- Shared site interactions -->
    <script src="script.js"></script>

    <!-- Auth-page interactions -->
    <script src="auth.js"></script>
</body>

</html>
